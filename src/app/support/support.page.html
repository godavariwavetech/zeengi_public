<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start" style="font-family: 'sfregular';">
      <ion-back-button defaultHref="/more"></ion-back-button>
    </ion-buttons>
    <ion-title style="font-family: 'sfregular';">Support</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="header-section ion-text-center" style="margin-top: 20px;">
    <h1>Need Help?</h1>
    <p>Our team is here to assist you. Reach out to us anytime.</p>
  </div>

  <ion-card class="contact-card">
    <ion-list style="padding:5%">
      <ion-item lines="none">
        &nbsp;&nbsp; <ion-icon name="mail-outline" slot="start" class="icon"></ion-icon>
        <ion-label>
          <h3>Email</h3>
          <p>
            <a *ngIf="user?.mail_id" [href]="'mailto:' + user.mail_id" class="link">
              {{ user.mail_id }}
            </a>
          </p>
        </ion-label>
      </ion-item>

      <ion-item lines="none">
        &nbsp;&nbsp; <ion-icon name="logo-whatsapp" slot="start" class="icon" style="color: #25D366;"></ion-icon>
        <ion-label>
          <h3>WhatsApp</h3>
          <p>
            <a [href]="'https://wa.me/' + number" class="link" target="_blank" rel="noopener">
              Chat with us on WhatsApp
            </a>
          </p>
        </ion-label>
      </ion-item>

    </ion-list>
  </ion-card>

  <ion-card class="form-card">
    <ion-card-header>
      <ion-card-title>Submit a Complaint</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <form (ngSubmit)="submitComplaint()" #complaintForm="ngForm">

        <!-- Description -->
        <ion-item>
          <ion-label position="stacked">Complaint Description</ion-label>
          <ion-textarea name="description" [(ngModel)]="complaint.description" placeholder="Describe your issue..."
            required></ion-textarea>
        </ion-item>

        <!-- Image Upload -->
        <ion-item>
          <ion-label position="stacked">Upload Image (optional)</ion-label>
          <input type="file" accept="image/*" (change)="onImageSelected($event)" style="padding: 8px;" />
        </ion-item>

        <!-- Preview (Optional) -->
        <div *ngIf="complaint.complaint_image" style="margin: 15px 0; text-align: center;">
          <img [src]="complaint.complaint_image" alt="Preview" style="max-width: 100%; border-radius: 8px;" />
        </div>

        <!-- Submit Button -->
        <!-- <ion-button expand="block" type="submit" [disabled]="!complaintForm.form.valid">
        Submit Complaint
      </ion-button> -->

        <ion-button class="green-button" expand="block" type="submit" [disabled]="!complaintForm.form.valid">
          Submit Complaint
        </ion-button>

      </form>
    </ion-card-content>
  </ion-card>


</ion-content>
