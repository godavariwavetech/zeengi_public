<ion-content>
  <br>
  <ion-row style="overflow: hidden;">
    <ion-col size="2" [routerLink]="['/more']"
      style="display: flex; align-items: center; font-size: 20px; color: rgb(0, 0, 0);">
      <ion-icon name="arrow-back"></ion-icon>
    </ion-col>
    <ion-col size="10" class="reg">
      <span class="hrae">Profile</span>
    </ion-col>
  </ion-row>

  <div class="avatar-container">
    <img [src]="profileImage || 'assets/icon/noimg.png'" alt="Profile" class="avatar-image">

    <input type="file" accept="image/*" (change)="onImageSelected($event)" id="fileInput" hidden>

    <label for="fileInput" class="edit-button">
      <ion-icon name="pencil-outline"></ion-icon>
    </label>
  </div>





  <form [formGroup]="userForm" class="custom-form">

    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" formControlName="customer_name" placeholder="Enter your name" class="custom-input">
    </div>

    <div class="form-group">
      <label class="form-label">Mobile Number</label>
      <input type="tel" formControlName="customer_mobile_number" placeholder="Enter your mobile number"
        class="custom-input">
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" formControlName="customer_email" placeholder="Enter your email" class="custom-input">
    </div>

    <div class="form-group">
      <label class="form-label">Gender</label>
      <select formControlName="gender" class="custom-input">
        <option value="" disabled selected>Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Anniversary</label>
      <input type="date" formControlName="anniversary" class="custom-input">
    </div>

    <div class="form-group">
      <label class="form-label">Date of Birth</label>
      <input type="date" formControlName="dob" class="custom-input">
    </div>

  </form>
