<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="gotoback()">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Select a location</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div style="padding: 2%;">
    <br>
    <div style="display: flex;align-items: center;">
      <div class="map-center-overlay2">
        <input type="text" id="place-input1" placeholder="Search for areaee, street name..." [(ngModel)]="searchQuery" />
        <ion-icon class="search-icon" name="search"></ion-icon>
        <ion-icon class="clear-icon" name="close-circle" *ngIf="searchQuery" (click)="clearSearch()"></ion-icon>
      </div>
    </div>
    <br>

    <!-- Add Address -->
    <ion-card class="card-section">
      <ion-item button (click)="usecurrentlocation2()">
        <ion-icon slot="start" name="locate" style="    margin-inline-end: 22px;"></ion-icon>
        <ion-label>
          Use Current Location
          <p *ngIf="currentaddress" style="font-size: 12px; color: var(--ion-color-medium); margin: 4px 0 0;">
            {{ currentaddress }}
          </p>
        </ion-label>
        <ion-icon slot="end" name="chevron-forward-outline" color="medium"></ion-icon>
      </ion-item>

      <ion-item button (click)="gotodeliverylocation()">
        <ion-icon slot="start" name="add-circle-outline"></ion-icon>
        <ion-label>Add Address</ion-label>
        <ion-icon slot="end" name="chevron-forward-outline" color="medium"></ion-icon>
      </ion-item>
    </ion-card>
    <br>
    <div class="category-header">
      <span class="category-title">SAVED ADDRESSESS</span>
      <div class="category-line"></div>
    </div>
    <ion-list *ngIf="address.length">
      <ion-item-sliding *ngFor="let i of address" style="padding: 5px 0px;">
        <ion-item lines="none" (click)="setaddress(i)" style="border: 1px solid #999999;border-radius: 10px;">
          <ion-label>
            <div class="address-type-row">
              <div class="address-type">
                <ng-container [ngSwitch]="i.address_type?.toLowerCase()">
                  <ion-icon *ngSwitchCase="'home'" name="home-outline" class="location-icon"></ion-icon>
                  <ion-icon *ngSwitchCase="'work'" name="briefcase-outline" class="location-icon"></ion-icon>
                  <ion-icon *ngSwitchCase="'hotel'" name="bed-outline" class="location-icon"></ion-icon>
                  <ion-icon *ngSwitchDefault name="location-outline" class="location-icon"></ion-icon>
                </ng-container>
                <span>{{ i.address_type }}</span>
              </div>

              <!-- Tap this icon to slide open -->
              <!-- <ion-icon name="ellipsis-vertical" class="menu-icon" ></ion-icon> -->
            </div>

            <p class="full-address">{{ i.full_address }}</p>
          </ion-label>
        </ion-item>

        <!-- Slide options -->
        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="deleteAddress(i)">
            <ion-icon slot="start" name="trash-outline"></ion-icon>
            Delete
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>



  </div>
</ion-content>
