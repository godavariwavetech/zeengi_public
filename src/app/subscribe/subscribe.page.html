<ion-header>
  <div class="category-header">
    <ion-button fill="clear" class="icon-button" (click)="goBack()">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </ion-button>
    <div class="tet"> Subscribe </div>
    <ion-button fill="clear" class="icon-button">
      <!-- <ion-icon name="basket-outline"></ion-icon> -->
    </ion-button>
  </div>
</ion-header>

<ion-content [fullscreen]="true">
  <!------yttuytuy----->
  <div class="cart-item">
    <ion-row>
      <ion-col size="4">
        <div class="cart-image">
          <img [src]="product?.item_image" style="width: 100%;
    height: 120px;" (error)="onImageError($event)">
        </div>
      </ion-col>
      <ion-col size="8">
        <!-- <div class="cart-details"> -->
        <!-- <ion-icon name="close-outline" (click)="removeItem()" style="float: right;"></ion-icon> -->
        <p style="    font-size: 14px;">{{ product?.item_name }} </p>
        <p style="    font-size: 14px;">{{ product?.item_description }} </p>
        <!-- <div class="get">{{ product?.item_description }}</div> -->
        <span *ngIf="product?.measurement_type">
            ⚖️
            {{ product?.measurement_type }}
          </span>
        <ion-row>
          <ion-col size="6">
            <div class="price">
          
              <span > ₹{{product?.selling_price}}
                <s *ngIf="product?.actual_price>product?.selling_price" style="        font-size: 14px;
        color: #a4a4a4;
        font-weight: 400;">
                  &nbsp;₹{{product?.actual_price}}</s>
              </span>
            </div>
          </ion-col>
          <ion-col size="6">
            <div class="quantity-control">
              <ion-button size="small" fill="clear" class="qty-btn" (click)="decreaseQty(product)">
                <ion-icon name="remove-outline" style="font-size: 16px;"></ion-icon>
              </ion-button>

              <div class="qty-display">{{ product?.itemscount }}</div>

              <ion-button size="small" fill="clear" class="qty-btn" (click)="increaseQty(product)">
                <ion-icon name="add-outline" style="font-size: 16px;"></ion-icon>
              </ion-button>
            </div>
          </ion-col>
        </ion-row>
        

        <!-- </div> -->
        


      </ion-col>
    </ion-row>

  </div>


  <div class="schedule-container">
    <div class="tet" style="padding: 2% 5px;"> Pick Schedule </div>
    <div class="schedule-options">
      <ion-chip [class.selected]="selectedSchedule === i.timeline" *ngFor="let i of subscribeitems"
        (click)="selectSchedule(i.timeline)">{{i.timeline}}</ion-chip>
    </div>

    <!-- Show date picker only after a schedule is selected -->
    <div *ngIf="selectedSchedule" class="start-date-container">
      <label class="date-label">Start Date</label>
      <ion-item lines="none">
        <ion-input
          type="date"
          [(ngModel)]="subscription_start_date"
          placeholder="Select start date"
          [min]="minSubscriptionDate">
        </ion-input>
      </ion-item>
    </div>
  </div>

  


</ion-content>

<ion-footer>
  <ion-toolbar>
    <div style="padding: 0 70px;" (click)="presentAlert()">
      <div class="custom-button">Subscribe</div>
    </div>
  </ion-toolbar>
</ion-footer>
